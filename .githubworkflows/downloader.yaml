name: Ultimate Unified Downloader
on:
  push:
    branches:
      - "**"

jobs:
  save-file:
    if: contains(github.event.head_commit.message, 'download:') || contains(github.event.head_commit.message, 'download-zip:') || contains(github.event.head_commit.message, 'download-tg:')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies (aria2, jq, zip)
        run: sudo apt-get update && sudo apt-get install -y aria2 jq zip curl

      - name: Extract URLs & Download Files
        run: |
          MSG=$(git log -1 --pretty=%B)
          mkdir -p downloads tmp_downloads new_files
          
          # بررسی نوع درخواست دانلود از روی پیام کامیت
          if echo "$MSG" | grep -qP 'download-zip:'; then
            MODE="zip"
            URL_LINE=$(echo "$MSG" | grep -oP 'download-zip:\s*\K.*')
          elif echo "$MSG" | grep -qP 'download-tg:'; then
            MODE="tg"
            URL_LINE=$(echo "$MSG" | grep -oP 'download-tg:\s*\K.*')
          elif echo "$MSG" | grep -qP 'download:'; then
            MODE="normal"
            URL_LINE=$(echo "$MSG" | grep -oP 'download:\s*\K.*')
          fi

          for URL in $URL_LINE; do
            if [ "$MODE" = "tg" ]; then
              echo "🔗 Processing Telegram link: $URL"
              RESPONSE=$(curl -s -X POST -H "User-Agent: Mozilla/5.0" -d "telegram_link=$URL" https://telegramdownloader.net/proxy.php)
              REAL_URL=$(echo "$RESPONSE" | jq -r '.data.data.link')
              if [ -z "$REAL_URL" ] || [ "$REAL_URL" = "null" ]; then
                echo "❌ Error getting direct link from TG!"
                continue
              fi
              # دانلود از تلگرام با هدرهای لازم
              curl -L -C - --progress-bar -H "User-Agent: Mozilla/5.0" -H "Referer: https://telegramdownloader.net/" -o "tmp_downloads/tg_downloaded_file" "$REAL_URL"
              # تلاش برای پیدا کردن نام اصلی
              ORIGINAL_NAME=$(echo "$RESPONSE" | jq -r '.data.data.file_name')
              [ "$ORIGINAL_NAME" != "null" ] && mv "tmp_downloads/tg_downloaded_file" "tmp_downloads/$ORIGINAL_NAME"
            else
              aria2c --split=2 --max-connection-per-server=2 --min-split-size=90M --dir="tmp_downloads" "$URL"
            fi
          done

          # اگر مود zip بود، کل فایل‌ها را در یک آرشیو قرار بده
          if [ "$MODE" = "zip" ]; then
            ARCHIVE_NAME="tmp_downloads/archive_$(date +%Y%m%d_%H%M%S).zip"
            zip -j "$ARCHIVE_NAME" tmp_downloads/*
            # پاک کردن فایل‌های اصلی برای نگه داشتن فقط فایل زیپ
            find tmp_downloads -type f ! -name "*.zip" -delete
          fi

          # بررسی حجم فایل‌ها و تقسیم فایل‌های بالای 90 مگابایت
          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            LIMIT=$((90 * 1024 * 1024))
            BASENAME=$(basename "$FILE")
            
            if [ "$SIZE" -gt "$LIMIT" ]; then
              zip -0 -s 90m "downloads/${BASENAME}.zip" -j "$FILE"
              # ثبت تمام پارت‌های ساخته شده برای لاگ
              cd downloads
              ls -1 "${BASENAME}"* >> ../new_files/list.txt
              cd ..
            else
              cp "$FILE" "downloads/$BASENAME"
              echo "$BASENAME" >> new_files/list.txt
            fi
          done
          rm -rf tmp_downloads

      - name: Update Links.md with Grouped Styling
        run: |
          if [ ! -f new_files/list.txt ]; then
            echo "No files to log."
            exit 0
          fi

          IR_TIME=$(TZ='Asia/Tehran' date +"%Y-%m-%d %H:%M IR")
          REPO="${{ github.repository }}"
          BRANCH="${GITHUB_REF_NAME}"
          FILE_NAME="Links.md"
          
          if [ ! -f "$FILE_NAME" ]; then
            echo -e "# 🔗 Direct Download Links\n\nClick on any link below to start downloading directly.\n\n---\n" > "$FILE_NAME"
          fi

          # ساختاربندی بلاک جدید (یک تاریخ برای تمام فایل‌های این اجرا)
          {
            head -n 5 "$FILE_NAME"
            echo -e "📅 **$IR_TIME**\n"
            
            while read -r FNAME; do
              FSIZE=$(du -sh "downloads/$FNAME" | awk '{print $1}')
              ENCODED_NAME=$(echo "$FNAME" | sed 's/ /%20/g')
              DL_URL="https://github.com/$REPO/raw/$BRANCH/downloads/$ENCODED_NAME"
              echo -e "📥 [$FNAME]($DL_URL) ｜ $FSIZE"
            done < new_files/list.txt
            
            echo -e "\n---"
            tail -n +6 "$FILE_NAME"
          } > Links.tmp && mv Links.tmp "$FILE_NAME"
          
          rm -rf new_files

      - name: Commit & Push in batches
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add Links.md

          mapfile -t ALL_FILES < <(git ls-files --others --modified --exclude-standard downloads/)
          TOTAL=${#ALL_FILES[@]}

          if [ "$TOTAL" -eq 0 ]; then
            echo "Nothing to commit"
            exit 0
          fi

          BATCH_SIZE=5
          for (( i=0; i<TOTAL; i+=BATCH_SIZE )); do
            BATCH=("${ALL_FILES[@]:i:BATCH_SIZE}")
            git add "${BATCH[@]}"
            git commit -m "Add downloaded files & update log [skip ci]"
            git pull --rebase origin "$BRANCH"
            git push origin HEAD:"$BRANCH"
          done